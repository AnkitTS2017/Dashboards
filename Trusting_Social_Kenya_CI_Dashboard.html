<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#183763;--blue:#0276f1;--blue-light:#e8f2ff;--red:#e74c3c;--orange:#f39c12;--green:#27ae60;--gray:#f5f7fa;--gray-border:#e1e5eb;--text:#2c3e50;--text-light:#7f8c8d;--white:#fff;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-hover:0 6px 20px rgba(0,0,0,.12);--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--gray);color:var(--text);line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* Sticky Header */
.header{position:sticky;top:0;z-index:100;background:var(--navy);color:var(--white);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header-meta{display:flex;gap:20px;font-size:13px;opacity:.85}
.header-meta span{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}

/* Filter Bar */
.filter-bar{background:var(--white);padding:14px 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--gray-border);position:sticky;top:56px;z-index:99}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-bar select,.filter-bar input{padding:8px 12px;border:1px solid var(--gray-border);border-radius:6px;font-size:13px;background:var(--white);min-width:180px}
.filter-bar input{min-width:240px}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,118,241,.12)}

/* Container */
.container{max-width:1400px;margin:0 auto;padding:24px 32px}
.section-title{font-size:22px;font-weight:700;color:var(--navy);margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--blue)}
.section-title:first-child{margin-top:0}

/* Subject Card */
.subject-card{background:linear-gradient(135deg,var(--navy) 0%,#1e4a8a 100%);color:var(--white);border-radius:var(--radius);padding:28px 32px;margin-bottom:32px;box-shadow:var(--shadow)}
.subject-card h2{font-size:24px;margin-bottom:6px}
.subject-card .subtitle{opacity:.8;font-size:14px;margin-bottom:16px}
.subject-stats{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.subject-stat{background:rgba(255,255,255,.12);padding:12px 20px;border-radius:8px;text-align:center;min-width:140px}
.subject-stat .num{font-size:22px;font-weight:700}
.subject-stat .lbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.5px}
.product-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.product-tag{background:rgba(255,255,255,.18);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500}
.management-list{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}
.mgmt-person{background:rgba(255,255,255,.1);padding:8px 14px;border-radius:8px;font-size:13px}
.mgmt-person strong{display:block;font-size:14px}
.mgmt-person span{opacity:.75;font-size:12px}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
@media(max-width:1100px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.cards-grid{grid-template-columns:1fr}}

.comp-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:all .2s;cursor:pointer;border:1px solid var(--gray-border)}
.comp-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.comp-card-header{padding:18px 20px 14px;border-bottom:1px solid var(--gray-border)}
.comp-card-header h3{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.comp-card-header h3 a{color:var(--text);font-size:12px;font-weight:400}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-category{background:var(--blue-light);color:var(--blue)}
.badge-high{background:#fde8e8;color:var(--red)}
.badge-medium{background:#fef3e2;color:#d68910}
.badge-low{background:#e8f8f0;color:var(--green)}
.overlap-tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.overlap-tag{background:var(--gray);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--text-light)}
.comp-card-body{padding:14px 20px}
.comp-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.comp-stat{font-size:12px;color:var(--text-light)}
.comp-stat strong{color:var(--text);font-weight:600}
.battle-summary{font-size:13px;color:var(--navy);font-weight:500;padding:8px 0;border-top:1px solid var(--gray-border);margin-top:8px}
.comp-card-expand{display:none;padding:0 20px 18px;font-size:13px;line-height:1.7}
.comp-card.expanded .comp-card-expand{display:block}
.expand-section{margin-bottom:12px}
.expand-section h4{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.expand-section ul{padding-left:18px}
.expand-section li{margin-bottom:3px;font-size:12px}
.leadership-grid{display:flex;flex-wrap:wrap;gap:8px}
.leader-chip{background:var(--gray);padding:6px 10px;border-radius:6px;font-size:12px}
.leader-chip strong{display:block}
.leader-chip a{font-size:11px}
.pain-item{background:#fff8f0;padding:8px 10px;border-radius:6px;margin-bottom:6px;border-left:3px solid var(--orange);font-size:12px}
.signal-item{background:var(--blue-light);padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px}
.click-hint{text-align:center;padding:8px;font-size:11px;color:var(--blue);font-weight:500;border-top:1px solid var(--gray-border)}

/* Comparison Table */
.table-wrap{overflow-x:auto;margin-bottom:32px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--gray-border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:var(--white);padding:12px 14px;text-align:left;font-weight:600;cursor:pointer;white-space:nowrap;user-select:none;position:relative}
th:hover{background:#1e4a8a}
th .sort-arrow{margin-left:4px;font-size:10px;opacity:.6}
td{padding:10px 14px;border-bottom:1px solid var(--gray-border)}
tr:hover td{background:var(--blue-light)}
tr:nth-child(even) td{background:#fafbfc}
tr:nth-child(even):hover td{background:var(--blue-light)}
.threat-cell{font-weight:700;text-transform:uppercase;font-size:12px}
.threat-cell.high{color:var(--red)}
.threat-cell.medium{color:#d68910}
.threat-cell.low{color:var(--green)}

.gaps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;margin-bottom:32px}
.gap-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--gray-border);border-top:3px solid var(--blue)}
.gap-card h3{font-size:16px;margin-bottom:8px;color:var(--navy)}
.gap-card .priority{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.priority-highest{background:#fde8e8;color:var(--red)}
.priority-high{background:#fef3e2;color:#d68910}
.gap-card p{font-size:13px;color:var(--text-light);margin-bottom:8px}
.gap-detail{font-size:12px;display:flex;gap:16px;flex-wrap:wrap}
.gap-detail span{background:var(--gray);padding:4px 10px;border-radius:6px}
.gap-detail strong{color:var(--navy)}

.watch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}

.watch-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--gray-border);border-left:4px solid var(--orange)}

.watch-card .timeframe{font-size:11px;background:var(--orange);color:var(--white);padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.watch-card p{font-size:13px;color:var(--text-light);margin-bottom:8px}
.watch-card .action{font-size:12px;font-weight:600;color:var(--blue);padding-top:6px;border-top:1px solid var(--gray-border)}

.intensity-section{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--gray-border);margin-bottom:32px}
.intensity-row{display:flex;align-items:center;margin-bottom:14px;gap:16px}

.intensity-bar-wrap{flex:1;background:var(--gray);border-radius:20px;height:28px;overflow:hidden;position:relative}
.intensity-bar{height:100%;border-radius:20px;display:flex;align-items:center;justify-content:flex-end;padding-right:12px;font-size:11px;font-weight:700;color:var(--white);transition:width .6s}

.intensity-high{background:linear-gradient(90deg,var(--orange),#e67e22);width:75%}
.intensity-medium{background:linear-gradient(90deg,#f1c40f,#d4ac0d);width:55%}
.intensity-low{background:linear-gradient(90deg,var(--green),#1e8449);width:25%}
.intensity-players{min-width:80px;text-align:right;font-size:12px;color:var(--text-light)}

/* Export Button */
.export-btn{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:var(--white);padding:12px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-bottom:32px}
.export-btn:hover{background:var(--blue)}
.export-btn svg{width:18px;height:18px;fill:currentColor}

.footer{text-align:center;padding:24px;font-size:12px;color:var(--text-light);border-top:1px solid var(--gray-border)}
</style>

document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

const productMap = {
  credit_scoring: ['credit scoring','alternative data credit scoring','credit reference bureau','alt-data scoring','smartphone credit scoring','digital lending','embedded lending'],
  ekyc: ['ekyc','biometrics','digital identity','identity verification'],
  ai_agents: ['ai agents','ai banking automation','ai agents for banks'],
  fraud: ['fraud prevention','fraud'],
  embedded: ['embedded finance','embedded lending','lending infrastructure']
};

function matchesProduct(comp, filter) {
  if (!filter) return true;
  const terms = productMap[filter] || [];
  const cat = (comp.primary_category || '').toLowerCase();
  const overlaps = (comp.products_overlap || []).map(p => p.toLowerCase());
  return terms.some(t => cat.includes(t) || overlaps.some(o => o.includes(t)));
}

function matchesThreat(comp, filter) {
  if (!filter) return true;
  return comp.threat_level === filter;
}

function matchesSearch(comp, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return (comp.name||'').toLowerCase().includes(q)
    || (comp.description||'').toLowerCase().includes(q)
    || (comp.primary_category||'').toLowerCase().includes(q)
    || (comp.hq||'').toLowerCase().includes(q);
}

function getFiltered() {
  const p = document.getElementById('filterProduct').value;
  const t = document.getElementById('filterThreat').value;
  const s = document.getElementById('filterSearch').value;
  return DATA.competitors.filter(c => matchesProduct(c,p) && matchesThreat(c,t) && matchesSearch(c,s));
}

function applyFilters() {
  renderAll(getFiltered());
}

let sortCol = null, sortAsc = true;

function renderAll(competitors) {
  const el = document.getElementById('main-content');
  el.innerHTML = '';

  // Subject Card
  el.innerHTML += renderSubject();

  // Section: Competitor Cards
  el.innerHTML += '<div class="section-title">Competitor Landscape (' + competitors.length + ' of ' + DATA.competitors.length + ')</div>';
  el.innerHTML += '<div class="cards-grid" id="cards-grid">' + competitors.map(renderCard).join('') + '</div>';

  // Comparison Matrix
  el.innerHTML += '<div class="section-title">Competitor Comparison Matrix</div>';
  el.innerHTML += renderTable(competitors);

  // Gaps
  el.innerHTML += '<div class="section-title">Gaps &amp; Opportunities</div>';
  el.innerHTML += '<div class="gaps-grid">' + DATA.gaps_and_opportunities.map(renderGap).join('') + '</div>';

  // Watch List
  el.innerHTML += '<div class="section-title">Strategic Watch List</div>';
  el.innerHTML += '<div class="watch-grid">' + DATA.strategic_watch_list.map(renderWatch).join('') + '</div>';

  // Intensity Bars
  el.innerHTML += '<div class="section-title">Competitive Intensity by Product Area</div>';
  el.innerHTML += renderIntensity();

  // Export
  el.innerHTML += '<button class="export-btn" onclick="exportJSON()"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Export JSON</button>';

  // Re-attach card click
  document.querySelectorAll('.comp-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') return;
      this.classList.toggle('expanded');
      const hint = this.querySelector('.click-hint');
      if (hint) hint.textContent = this.classList.contains('expanded') ? 'Click to collapse' : 'Click to expand full profile';
    });
  });
}

function renderTable(competitors) {
  const cols = [
    {key:'rank',label:'#'},
    {key:'name',label:'Name'},
    {key:'hq',label:'HQ'},
    {key:'founded_year',label:'Founded'},
    {key:'headcount',label:'Headcount'},
    {key:'funding',label:'Funding'},
    {key:'revenue',label:'Revenue'},
    {key:'threat_level',label:'Threat'},
    {key:'products_overlap',label:'Products'}
  ];

  let sorted = [...competitors];
  if (sortCol) {
    sorted.sort((a,b) => {
      let av = getVal(a,sortCol), bv = getVal(b,sortCol);
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  function getVal(c,key) {
    if (key==='funding') return c.financials.total_raised||c.financials.funding_stage||'';
    if (key==='revenue') return c.financials.revenue_estimate||'';
    if (key==='products_overlap') return (c.products_overlap||[]).join(', ');
    return c[key]||'';
  }

  const ths = cols.map(c => {
    const arrow = sortCol===c.key ? (sortAsc ? ' &#9650;' : ' &#9660;') : '';
    return `<th onclick="sortTable('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  const rows = sorted.map(c => {
    const threatCls = c.threat_level;
    return `<tr>
      <td>${c.rank}</td>
      <td><strong>${c.name}</strong></td>
      <td>${c.hq}</td>
      <td>${c.founded_year}</td>
      <td>${c.headcount}</td>
      <td>${c.financials.total_raised||c.financials.funding_stage||'N/A'}</td>
      <td>${c.financials.revenue_estimate||'N/A'}</td>
      <td class="threat-cell ${threatCls}">${c.threat_level}</td>
      <td>${(c.products_overlap||[]).map(p => `<span class="overlap-tag">${p}</span>`).join(' ')}</td>
    </tr>`;
  }).join('');

  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderGap(g) {
  const pClass = g.priority === 'highest' ? 'priority-highest' : 'priority-high';
  return `<div class="gap-card">
    <span class="priority ${pClass}">${g.priority} priority</span>
    <h3>${g.gap}</h3>
    <p>${g.description}</p>
    <div class="gap-detail">
      <span><strong>TS Fit:</strong> ${g.ts_product_fit}</span>
      <span><strong>TAM:</strong> ${g.estimated_tam}</span>
    </div>
  </div>`;
}

function renderWatch(w) {
  return `<div class="watch-card">
    <h3>${w.entity}</h3>
    <span class="timeframe">${w.timeframe}</span>
    <p>${w.why_watch}</p>
    <div class="action">${w.action}</div>
  </div>`;
}

function renderIntensity() {
  const ci = DATA.landscape_analysis.competitive_intensity_by_product;
  const order = ['credit_scoring','ekyc_identity','fraud_prevention','ai_agents','embedded_finance'];
  const labels = {credit_scoring:'Credit Scoring',ekyc_identity:'eKYC / Identity',fraud_prevention:'Fraud Prevention',ai_agents:'AI Agents',embedded_finance:'Embedded Finance'};
  let html = '<div class="intensity-section">';
  order.forEach(k => {
    const d = ci[k];
    html += `<div class="intensity-row">
      <div class="intensity-label">${labels[k]}</div>
      <div class="intensity-bar-wrap"><div class="intensity-bar intensity-${d.intensity}">${d.intensity.replace('_',' ')}</div></div>
      <div class="intensity-players">${d.players} player${d.players!==1?'s':''}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function sortTable(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  applyFilters();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'competitive_intelligence.json'; a.click();
  URL.revokeObjectURL(url);
}

// Initial render
renderAll(DATA.competitors);
</script>
</body>
</html>
