<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trusting Social — Dashboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --border: rgba(255,255,255,0.07);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 860px;
    }

    header {
      margin-bottom: 3.5rem;
      text-align: center;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 1rem;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(59,130,246,0.35);
      box-shadow: 0 12px 40px rgba(59,130,246,0.12), 0 0 0 1px rgba(59,130,246,0.1);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .icon-blue   { background: rgba(59,130,246,0.15); }
    .icon-cyan   { background: rgba(6,182,212,0.15);  }
    .icon-violet { background: rgba(139,92,246,0.15); }
    .icon-emerald{ background: rgba(16,185,129,0.15); }

    .card-body { flex: 1; min-width: 0; }

    .card-region {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-arrow {
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      font-size: 1.1rem;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-line">
        <div class="logo-dot"></div>
        <span class="logo-text">Trusting Social</span>
        <div class="logo-dot"></div>
      </div>
      <h1>Intelligence Dashboards</h1>
      <p class="subtitle">Select a dashboard to explore</p>
    </header>

    <div class="grid">
      <a class="card" href="Trusting_Social_CI_Dashboard.html">
        <div class="card-icon icon-blue">📊</div>
        <div class="card-body">
          <div class="card-region">South Africa</div>
          <div class="card-title">Competitive Intelligence Dashboard</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="Trusting_Social_Kenya_CI_Dashboard.html">
        <div class="card-icon icon-cyan">🌍</div>
        <div class="card-body">
          <div class="card-region">Kenya</div>
          <div class="card-title">Competitive Intelligence Dashboard</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="Trusting_Social_Kenya_Account_Intelligence_Dashboard.html">
        <div class="card-icon icon-violet">🔍</div>
        <div class="card-body">
          <div class="card-region">Kenya</div>
          <div class="card-title">Account Intelligence Dashboard</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="Trusting_Social_South_Africa_Account_Intelligence_Dashboard.html">
        <div class="card-icon icon-emerald">🇿🇦</div>
        <div class="card-body">
          <div class="card-region">South Africa</div>
          <div class="card-title">Account Intelligence Dashboard</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <footer>Trusting Social &mdash; Internal Use Only</footer>
  </div>
</body>
</html>\
